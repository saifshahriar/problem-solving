<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CipherVault - Secure API</title>
		<style>
			body {
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				background-color: #121212;
				color: #ffffff;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				margin: 0;
			}

			.vault-card {
				background-color: #1e1e1e;
				padding: 30px;
				border-radius: 10px;
				box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
				width: 100%;
				max-width: 350px;
				text-align: center;
				border: 1px solid #333;
				box-sizing: border-box;
			}

			h2 {
				margin-top: 0;
				color: #4caf50;
				letter-spacing: 1px;
			}

			.input-group {
				margin-bottom: 15px;
				text-align: left;
			}

			input {
				width: 100%;
				padding: 10px;
				margin-top: 5px;
				border: 1px solid #444;
				border-radius: 5px;
				background-color: #2c2c2c;
				color: white;
				box-sizing: border-box;
			}

			input:focus {
				outline: none;
				border-color: #4caf50;
			}

			#token-display {
				width: 100%;
				padding: 10px;
				margin-bottom: 15px;
				border: 1px solid #444;
				border-radius: 5px;
				background-color: #1a1a1a;
				color: #4caf50;
				box-sizing: border-box;
				font-family: monospace;
				font-size: 11px;
				resize: none;
				word-wrap: break-word;
			}

			button {
				width: 100%;
				padding: 10px;
				margin: 8px 0;
				border: none;
				border-radius: 5px;
				cursor: pointer;
				font-weight: bold;
				font-size: 15px;
				transition: 0.2s;
			}

			.btn-primary {
				background-color: #4caf50;
				color: white;
			}
			.btn-primary:hover {
				background-color: #45a049;
			}

			.btn-secondary {
				background-color: #2196f3;
				color: white;
			}
			.btn-secondary:hover {
				background-color: #1976d2;
			}

			.btn-danger {
				background-color: #f44336;
				color: white;
			}
			.btn-danger:hover {
				background-color: #da190b;
			}

			#message-box {
				margin-top: 20px;
				padding: 10px;
				border-radius: 5px;
				font-size: 0.9em;
				display: none;
				word-wrap: break-word;
			}

			.success {
				background-color: rgba(76, 175, 80, 0.1);
				color: #4caf50;
				border: 1px solid #4caf50;
			}
			.error {
				background-color: rgba(244, 67, 54, 0.1);
				color: #f44336;
				border: 1px solid #f44336;
			}

			#auth-section {
				display: block;
			}
			#vault-section {
				display: none;
			}
		</style>
	</head>
	<body>
		<div class="vault-card">
			<h2>🔒 CipherVault</h2>

			<!-- Login & Register Section -->
			<div id="auth-section">
				<div class="input-group">
					<input
						type="text"
						id="username"
						placeholder="Username"
						autocomplete="off"
					/>
					<input
						type="password"
						id="password"
						placeholder="Password"
					/>
				</div>
				<button class="btn-secondary" onclick="register()">
					Register
				</button>
				<button class="btn-primary" onclick="login()">Login</button>
			</div>

			<!-- Protected Vault Section -->
			<div id="vault-section">
				<p style="color: #aaa; margin-bottom: 10px; font-size: 14px">
					You are securely authenticated.
				</p>

				<p
					style="
						color: #888;
						font-size: 12px;
						margin: 0 0 5px 0;
						text-align: left;
					"
				>
					Your Active JWT:
				</p>
				<textarea id="token-display" rows="4" readonly></textarea>

				<button class="btn-primary" onclick="getSecret()">
					Access Launch Codes
				</button>
				<button class="btn-danger" onclick="logout()">
					Secure Logout
				</button>
			</div>

			<!-- Status Messages -->
			<div id="message-box"></div>
		</div>

		<script>
			function getBackendDomain() {
				const domain = window.location.hostname;

				if (domain === "localhost" || domain === "127.0.0.1") {
					return "http://localhost:8080";
				}

				const protocolPrefix = "https://";
				const firstDotIndex = domain.indexOf(".");

				if (firstDotIndex === -1) {
					return protocolPrefix + domain + "-backend";
				}

				const subdomain = domain.substring(0, firstDotIndex);
				const restOfDomain = domain.substring(firstDotIndex);
				return protocolPrefix + subdomain + "-backend" + restOfDomain;
			}

			function showMessage(msg, isError = false) {
				const box = document.getElementById("message-box");
				box.style.display = "block";
				box.textContent = msg;
				box.className = isError ? "error" : "success";
			}

			function checkAuth() {
				const token = localStorage.getItem("cipher_jwt");
				if (token) {
					document.getElementById("auth-section").style.display =
						"none";
					document.getElementById("vault-section").style.display =
						"block";

					document.getElementById("token-display").value = token;
				} else {
					document.getElementById("auth-section").style.display =
						"block";
					document.getElementById("vault-section").style.display =
						"none";
					document.getElementById("username").value = "";
					document.getElementById("password").value = "";

					document.getElementById("token-display").value = "";
				}
			}

			// 1. Register API Call
			async function register() {
				const u = document.getElementById("username").value;
				const p = document.getElementById("password").value;
				const apiUrl = getBackendDomain() + "/register";

				try {
					const res = await fetch(apiUrl, {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({ username: u, password: p }),
					});

					if (res.ok) {
						showMessage(
							"Registered successfully! You can now login.",
						);
					} else {
						const text = await res.text();
						showMessage(text, true);
					}
				} catch (error) {
					showMessage("Network Error. Is the backend running?", true);
				}
			}

			// 2. Login API Call
			async function login() {
				const u = document.getElementById("username").value;
				const p = document.getElementById("password").value;
				const apiUrl = getBackendDomain() + "/login";

				try {
					const res = await fetch(apiUrl, {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({ username: u, password: p }),
					});

					if (res.ok) {
						const data = await res.json();
						localStorage.setItem("cipher_jwt", data.token);
						showMessage("Logged in successfully!");
						checkAuth();
					} else {
						const text = await res.text();
						showMessage(text, true);
					}
				} catch (error) {
					showMessage("Network Error. Is the backend running?", true);
				}
			}

			// 3. Access Protected Route (Requires JWT)
			async function getSecret() {
				const token = localStorage.getItem("cipher_jwt");
				const apiUrl = getBackendDomain() + "/secret";

				try {
					const res = await fetch(apiUrl, {
						method: "GET",

						// Attach JWT
						headers: { Authorization: `Bearer ${token}` },
					});

					if (res.ok) {
						const data = await res.json();
						showMessage(`🔓 Secret Unlocked: ${data.message}`);
					} else {
						const text = await res.text();
						showMessage(`⛔ Access Denied: ${text}`, true);

						// If token is invalid or blacklisted, force logout on the frontend
						if (res.status === 401) {
							localStorage.removeItem("cipher_jwt");

							// Wait 2 seconds then reset UI
							setTimeout(checkAuth, 2000);
						}
					}
				} catch (error) {
					showMessage("Network Error.", true);
				}
			}

			// 4. Secure Logout API Call
			async function logout() {
				const token = localStorage.getItem("cipher_jwt");
				const apiUrl = getBackendDomain() + "/logout";

				try {
					const res = await fetch(apiUrl, {
						method: "POST",
						headers: { Authorization: `Bearer ${token}` },
					});

					if (res.ok) {
						// Clear local storage
						localStorage.removeItem("cipher_jwt");
						showMessage("Logged out securely. Token Blacklisted.");
						checkAuth();
					}
				} catch (error) {
					showMessage("Network Error.", true);
				}
			}

			// Run auth check on page load
			checkAuth();
		</script>
	</body>
</html>
